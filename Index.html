//  HELPERS
// ═══════════════════════════════════════════════

const parseNum = (v) => {
  if (v == null || v === "" || v === "-") return 0;
  if (typeof v === "number") return isNaN(v) ? 0 : v;
  const s = String(v).trim().replace(/[$\s]/g, "").replace(/\./g, "").replace(",", ".");
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};

const fmt = (n, dec = 0) => {
  if (n == null || isNaN(n)) return "-";
  return new Intl.NumberFormat("es-CL", {
    minimumFractionDigits: dec,
    maximumFractionDigits: dec,
  }).format(n);
};
const fmtM   = (n) => fmt(n, 0);
const fmtPct = (n) => (!isFinite(n) || isNaN(n) ? "-" : fmt(n, 1) + "%");

const parseDate = (s) => {
  if (!s) return null;
  const p = String(s).trim().split("/");
  if (p.length === 3) return new Date(+p[2], +p[1] - 1, +p[0]);
  return null;
};
const fmtDate = (d) => {
  if (!d) return "";
  return [
    String(d.getDate()).padStart(2, "0"),
    String(d.getMonth() + 1).padStart(2, "0"),
    d.getFullYear(),
  ].join("/");
};

const parseCSVText = (text) => {
  const lines = text.split(/\r?\n/).filter(Boolean);
  if (!lines.length) return [];
  const headers = lines[0].replace(/^\uFEFF/, "").split(";").map((h) => h.trim());
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].split(";");
    if (vals.every((v) => !v.trim())) continue;
    const row = {};
    headers.forEach((h, j) => { row[h] = (vals[j] || "").trim(); });
    result.push(row);
  }
  return result;
};

const col = (row, ...keys) => {
  for (const k of keys) {
    const found = Object.keys(row).find(
      (rk) => rk.toLowerCase().trim() === k.toLowerCase().trim()
    );
    if (found !== undefined && row[found] !== undefined) return row[found];
  }
  return "";
};

// ═══════════════════════════════════════════════
//  PERIODS
// ═══════════════════════════════════════════════

const s0  = (d) => { const r = new Date(d); r.setHours(0, 0, 0, 0);     return r; };
const e23 = (d) => { const r = new Date(d); r.setHours(23, 59, 59, 999); return r; };

const getWeekStart = (d) => {
  const day = d.getDay();
  const r   = new Date(d);
  r.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return s0(r);
};

const getPeriods = (ref) => {
  const today      = e23(ref);
  const weekStart  = getWeekStart(ref);
  const weekEnd    = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6); e23(weekEnd);
  const monthStart  = new Date(ref.getFullYear(), ref.getMonth(), 1);
  const monthEnd    = new Date(ref.getFullYear(), ref.getMonth() + 1, 0, 23, 59, 59, 999);
  const roll30Start = s0(new Date(ref.getFullYear(), ref.getMonth(), ref.getDate() - 29));
  const qMonth      = Math.floor(ref.getMonth() / 3) * 3;
  const qStart      = new Date(ref.getFullYear(), qMonth, 1);
  const qEnd        = new Date(ref.getFullYear(), qMonth + 3, 0, 23, 59, 59, 999);
  const roll90Start = s0(new Date(ref.getFullYear(), ref.getMonth(), ref.getDate() - 89));
  return { weekStart, weekEnd, monthStart, monthEnd, roll30Start, qStart, qEnd, roll90Start, today };
};

const inR = (date, start, end) => date >= start && date <= end;

// ═══════════════════════════════════════════════
//  SORT
// ═══════════════════════════════════════════════

const useSort = (initKey = null, initDir = "desc") => {
  const [st, setSt] = useState({ key: initKey, dir: initDir });
  const toggle = useCallback((k) => {
    setSt((p) => ({ key: k, dir: p.key === k && p.dir === "desc" ? "asc" : "desc" }));
  }, []);
  return { ...st, toggle };
};

const applySort = (data, key, dir, accessor) => {
  if (!key) return data;
  return [...data].sort((a, b) => {
    let va = accessor ? accessor(a, key) : a[key];
    let vb = accessor ? accessor(b, key) : b[key];
    if (typeof va === "string") va = va.toLowerCase();
    if (typeof vb === "string") vb = vb.toLowerCase();
    va = va ?? 0; vb = vb ?? 0;
    if (va < vb) return dir === "asc" ? -1 : 1;
    if (va > vb) return dir === "asc" ?  1 : -1;
    return 0;
  });
};

// ═══════════════════════════════════════════════
//  PAGINATION
// ═══════════════════════════════════════════════

const usePag = (data, size = 50) => {
  const [page, setPage] = useState(0);
  const totalPages = Math.max(1, Math.ceil(data.length / size));
  const safePage   = Math.min(page, totalPages - 1);
  const slice      = data.slice(safePage * size, (safePage + 1) * size);
  const go = useCallback(
    (p) => setPage(Math.max(0, Math.min(p, Math.max(0, Math.ceil(data.length / size) - 1)))),
    [data.length, size]
  );
  return { page: safePage, go, totalPages, slice, total: data.length };
};

        className="w-full max-w-lg border-2 border-dashed rounded-2xl p-12 text-center cursor-pointer transition-all select-none"
        style={{
          borderColor: dragging ? "#c88d31" : "#2a2a2a",

        {loading
          ? <div className="flex flex-col items-center gap-3">

//  TAB 1 — VENTAS
// ═══════════════════════════════════════════════

const calcP = (rows) => {
  const venta   = rows.reduce((s, r) => s + r.venta,   0);
  const contrib = rows.reduce((s, r) => s + r.contrib, 0);
  return { venta, contrib, margen: venta > 0 ? (contrib / venta) * 100 : 0 };
};

const PCOLS = [
  { k: "week",    l: "Semana"     },
  { k: "month",   l: "Mes Cal."   },
  { k: "roll30",  l: "30 Días"    },
  { k: "quarter", l: "Trim. Cal." },
  { k: "roll90",  l: "90 Días"    },
];

const VentasTab = ({ data }) => {
  const [search,  setSearch]  = useState("");
  const [metric,  setMetric]  = useState("venta");
  const [showTop, setShowTop] = useState("venta");

  const mainSort = useSort("totalV", "desc");
  const topSort  = useSort(null,     "desc");
  const skuSort  = useSort("venta",  "desc");

  const rows = useMemo(() =>
    data.map((r) => ({
      cliente:  col(r, "Razón Social", "Razon Social"),
      fecha:    parseDate(col(r, "Fecha")),
      producto: col(r, "Producto"),
      venta:    parseNum(col(r, "Total Línea",    "Total Linea")),
      contrib:  parseNum(col(r, "Margen Contrib $")),
    })).filter((r) => r.fecha && r.cliente),
  [data]);

  const refDate = useMemo(() => {
    if (!rows.length) return new Date();
    return new Date(Math.max(...rows.map((r) => r.fecha.getTime())));
  }, [rows]);

  const P = useMemo(() => getPeriods(refDate), [refDate]);

  const clientMap = useMemo(() => {
    const m = {};
    rows.forEach((r) => {
      if (!r.cliente) return;
      if (!m[r.cliente]) m[r.cliente] = { rows: [], skus: new Set() };
      m[r.cliente].rows.push(r);
      if (r.producto) m[r.cliente].skus.add(r.producto);
    });
    return m;
  }, [rows]);

  const globals = useMemo(() => {
    const f   = (a, b) => rows.filter((r) => inR(r.fecha, a, b));
    const r90 = f(P.roll90Start, P.today);
    return {
      week:    calcP(f(P.weekStart,  P.weekEnd)),
      month:   calcP(f(P.monthStart, P.monthEnd)),
      roll30:  calcP(f(P.roll30Start, P.today)),
      quarter: calcP(f(P.qStart,     P.qEnd)),
      roll90:  { ...calcP(r90), skus: new Set(r90.map((r) => r.producto).filter(Boolean)).size },
    };
  }, [rows, P]);

  const summaries = useMemo(() => {
    return Object.entries(clientMap).map(([cliente, c]) => {
      const f = (a, b) => c.rows.filter((r) => inR(r.fecha, a, b));
      const build = (a, b, g) => {
        const p = calcP(f(a, b));
        return { ...p, ppv: g.venta > 0 ? (p.venta / g.venta) * 100 : 0, ppc: g.contrib > 0 ? (p.contrib / g.contrib) * 100 : 0 };
      };
      const totalV = c.rows.reduce((s, r) => s + r.venta,   0);
      const totalC = c.rows.reduce((s, r) => s + r.contrib, 0);
      return {
        cliente, skus: c.skus.size,
        week:    build(P.weekStart,  P.weekEnd,  globals.week),
        month:   build(P.monthStart, P.monthEnd, globals.month),
        roll30:  build(P.roll30Start, P.today,   globals.roll30),
        quarter: build(P.qStart,     P.qEnd,     globals.quarter),
        roll90:  build(P.roll90Start, P.today,   globals.roll90),
        totalV, totalC, rows: c.rows,
      };
    }).sort((a, b) => b.totalV - a.totalV);
  }, [clientMap, P, globals]);

  const top20V = useMemo(() => summaries.slice(0, 20), [summaries]);
  const top20C = useMemo(() => [...summaries].sort((a, b) => b.totalC - a.totalC).slice(0, 20), [summaries]);
  const topBase = showTop === "venta" ? top20V : top20C;

  const sortedTop = useMemo(() => {
    if (!topSort.key) return topBase;
    return applySort(topBase, topSort.key, topSort.dir, (c, k) => {
      if (k === "cliente") return c.cliente.toLowerCase();
      if (k === "total")   return showTop === "venta" ? c.totalV : c.totalC;
      if (k === "margen")  return c.totalV > 0 ? (c.totalC / c.totalV) * 100 : 0;
      if (k === "skus")    return c.skus;
      return 0;
    });
  }, [topBase, topSort.key, topSort.dir, showTop]);

  const filtered = useMemo(() => {
    if (!search.trim()) return summaries;
    const q = search.toLowerCase();
    return summaries.filter((c) => c.cliente.toLowerCase().includes(q));
  }, [summaries, search]);

  const mainAccessor = useCallback((c, sk) => {
    if (sk === "cliente") return c.cliente.toLowerCase();
    if (sk === "skus")    return c.skus;
    for (const { k } of PCOLS) {
      if (sk === k) {
        if (metric === "venta")   return c[k].venta;
        if (metric === "contrib") return c[k].contrib;
        return c[k].margen;
      }
      if (sk === k + "_p") return metric === "venta" ? c[k].ppv : c[k].ppc;
    }
    return 0;
  }, [metric]);

  const sortedFiltered = useMemo(
    () => applySort(filtered, mainSort.key, mainSort.dir, mainAccessor),
    [filtered, mainSort.key, mainSort.dir, mainAccessor]
  );

  const clientDetail = useMemo(() => {
    if (!search.trim() || filtered.length !== 1) return null;
    const c = filtered[0];
    const skuMap = {}; const byWeek = {};
    c.rows.forEach((r) => {
      const k = r.producto || "(sin nombre)";
      if (!skuMap[k]) skuMap[k] = { sku: k, venta: 0, contrib: 0 };
      skuMap[k].venta   += r.venta;
      skuMap[k].contrib += r.contrib;
      const ws = getWeekStart(r.fecha); const wk = ws.toISOString().slice(0, 10);
      if (!byWeek[wk]) byWeek[wk] = { label: fmtDate(ws), venta: 0, contrib: 0 };
      byWeek[wk].venta += r.venta; byWeek[wk].contrib += r.contrib;
    });
    return {
      ...c,
      skuBreakdown: Object.values(skuMap).map((s) => ({ ...s, margen: s.venta > 0 ? (s.contrib / s.venta) * 100 : 0 })),
      trend: Object.values(byWeek).sort((a, b) => a.label.localeCompare(b.label)).slice(-16),
    };
  }, [filtered, search]);

  const sortedSKUs = useMemo(() => {
    if (!clientDetail) return [];
    return applySort(clientDetail.skuBreakdown, skuSort.key, skuSort.dir, (s, k) => {
      if (k === "sku") return s.sku.toLowerCase();
      return s[k] ?? 0;
    });
  }, [clientDetail, skuSort.key, skuSort.dir]);

  const { page, go, totalPages, slice, total } = usePag(sortedFiltered);
  const getCellVal = (c, pk) => {
    const p = c[pk];
    if (metric === "venta")   return "$" + fmtM(p.venta);
    if (metric === "contrib") return "$" + fmtM(p.contrib);
    return fmtPct(p.margen);
  };
  const STHtop  = (props) => <SortTh {...props} currentKey={topSort.key}  dir={topSort.dir}  onSort={topSort.toggle}  />;
  const STHmain = (props) => <SortTh {...props} currentKey={mainSort.key} dir={mainSort.dir} onSort={mainSort.toggle} />;
  const STHsku  = (props) => <SortTh {...props} currentKey={skuSort.key}  dir={skuSort.dir}  onSort={skuSort.toggle}  />;

  return (
    <div className="space-y-5">
      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-3">
        <Card label="Venta Trim. Cal."    value={"$" + fmtM(globals.quarter.venta)}   sub={rows.length.toLocaleString("es-CL") + " líneas"} color="text-blue-300" />
        <Card label="Contrib. Trim. Cal." value={"$" + fmtM(globals.quarter.contrib)} sub={"Margen: " + fmtPct(globals.quarter.margen)} color="text-emerald-300" />
        <Card label="Margen % 90 días"    value={fmtPct(globals.roll90.margen)}        sub={"Contrib: $" + fmtM(globals.roll90.contrib)} color="text-yellow-300" />
        <Card label="SKUs únicos 90 días" value={globals.roll90.skus}                  sub="Productos distintos" color="text-pink-300" />
        <Card label="Clientes Activos"    value={summaries.filter((c) => c.quarter.venta > 0).length} sub="En trim. cal." />
        <Card label="Fecha Referencia"    value={fmtDate(refDate)} sub="Último movimiento" />
      </div>

      {/* Top 20 */}
      <div className="bg-gray-900 border border-gray-700 rounded-xl overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 border-b border-gray-700">
          <div className="flex items-center gap-2"><Award size={16} className="text-yellow-400" /><span className="font-semibold text-white">Top 20 Clientes</span></div>
          <div className="flex gap-1">
            {[["venta", "Por Venta"], ["contrib", "Por Contribución"]].map(([k, l]) => (
              <button key={k} onClick={() => setShowTop(k)}
                className={`px-2.5 py-1 rounded text-xs font-medium transition-all ${showTop === k ? "bg-yellow-500/20 text-yellow-300 border border-yellow-500/40" : "bg-gray-800 text-gray-400 hover:text-white border border-gray-700"}`}>{l}</button>
            ))}
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full">
            <thead className="bg-gray-800/60">
              <tr>
                <Th ch="#" />
                <STHtop label="Cliente"                                                 sk="cliente" />
                <STHtop label={showTop === "venta" ? "Venta Total" : "Contrib. Total"} sk="total"   right />
                <STHtop label="Margen %"                                                sk="margen"  right />
                <STHtop label="SKUs"                                                    sk="skus"    right />
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-800/60">
              {sortedTop.map((c, i) => (
                <tr key={c.cliente} className="hover:bg-gray-800/40 transition-colors">
                  <Td ch={i + 1} bold color={i < 3 ? "text-yellow-400" : "text-gray-600"} />
                  <td className="px-3 py-2 text-sm text-gray-200 max-w-xs"><span className="block truncate">{c.cliente}</span></td>
                  <Td ch={"$" + fmtM(showTop === "venta" ? c.totalV : c.totalC)} right bold />
                  <Td ch={fmtPct(c.totalV > 0 ? (c.totalC / c.totalV) * 100 : 0)} right color="text-emerald-400" />
                  <Td ch={c.skus} right dim />
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Search + metric selector */}
      <div className="flex items-center gap-3 flex-wrap">
        <SearchBar value={search} onChange={(v) => { setSearch(v); go(0); }} placeholder="Buscar cliente para ver detalle o filtrar listado…" />
        <div className="flex gap-1 shrink-0">
          {[["venta", "Venta Neta"], ["contrib", "Contribución"], ["margen", "Margen %"]].map(([k, l]) => (
            <button key={k} onClick={() => setMetric(k)}
              className={`px-3 py-2 rounded-lg text-xs font-semibold transition-all ${metric === k ? "bg-blue-600 text-white" : "bg-gray-800 text-gray-400 hover:text-white border border-gray-700"}`}>{l}</button>
          ))}

//  TAB 4 — OPTIMIZADOR DE PRECIOS
// ═══════════════════════════════════════════════

const PRICE_KW = ["precio", "price", "valor", "costo", "tarifa", "p.u.", "pu", "unit", "importe"];
const PROD_KW  = ["producto", "descripcion", "descripción", "articulo", "artículo", "corte", "nombre", "item", "detalle", "concepto"];
const ATTR_KW  = ["marca", "procedencia", "origen", "planta", "pais", "país", "raza", "tipo", "calidad"];

const GROUP_STRIP = new Set([
  "medallon","medallón","medallones",
  "entero","entera","enteros","enteras",
  "porcionado","porcionada","porcionados","porcionadas",
  "trozado","trozada","trozados",
]);

const normStr = (s) =>
  String(s).toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ").trim();

const makeGroupKey = (normProd) =>
  normProd.split(" ").filter(w => w && !GROUP_STRIP.has(w)).join(" ").trim() || normProd;

const detectProvCat = (filename, sheetName = "") => {
  const base = filename.replace(/\.(xlsx?|csv)$/i, "");
  const dashIdx = base.indexOf("-");
  if (dashIdx > 0) {
    return { provider: base.slice(0, dashIdx).trim(), category: base.slice(dashIdx + 1).trim() };
  }
  const ignored = ["sheet1", "hoja1", "sheet", "hoja", "data", "datos", "precios", "lista"];
  const catFromSheet = sheetName && !ignored.includes(sheetName.toLowerCase().trim())
    ? sheetName.trim() : "Vacuno";
  return { provider: base.trim(), category: catFromSheet };
};

const parseSheetGrid = (grid, provider, category, fileId) => {
  if (!grid || grid.length < 2) return [];
  let hRow = -1;
  for (let i = 0; i < Math.min(15, grid.length); i++) {
    const row = grid[i];
    const strCells = row.filter(
      (c) => c !== "" && c != null && typeof c === "string" && c.trim().length > 1 && isNaN(Number(String(c).replace(",",".")))
    );
    if (strCells.length >= 2) { hRow = i; break; }
  }
  if (hRow === -1) return [];
  const headers = grid[hRow].map((h) => String(h == null ? "" : h).trim());
  const hNorm   = headers.map((h) => normStr(h));
  let prodCol  = hNorm.findIndex((h) => PROD_KW.some((kw) => h.includes(kw)));
  if (prodCol  === -1) prodCol  = headers.findIndex((h) => h !== "");
  let priceCol = hNorm.findIndex((h) => PRICE_KW.some((kw) => h.includes(kw)));
  if (priceCol === -1) {
    for (let c = 0; c < headers.length; c++) {
      if (c === prodCol) continue;
      const sample = grid.slice(hRow + 1, hRow + 9).map((r) => r[c]).filter((v) => v !== "" && v != null);
      if (sample.length >= 2 && sample.every((v) => parseNum(String(v)) > 0)) { priceCol = c; break; }
    }
  }
  const attrCols = hNorm.reduce((acc, h, i) => {
    if (ATTR_KW.some((kw) => h.includes(kw))) acc.push({ idx: i });
    return acc;
  }, []);
  if (prodCol === -1 || priceCol === -1) return [];
  const rows = [];
  for (let i = hRow + 1; i < grid.length; i++) {
    const row     = grid[i];
    const rawProd = String(row[prodCol] == null ? "" : row[prodCol]).trim();
    const rawPrc  = row[priceCol];
    if (!rawProd || rawPrc === "" || rawPrc == null) continue;
    const precio = parseNum(String(rawPrc));
    if (precio <= 0) continue;
    const atributo = attrCols
      .map((a) => String(row[a.idx] == null ? "" : row[a.idx]).trim())
      .filter(Boolean).join(" · ");
    const productoNorm = normStr(rawProd);
    rows.push({
      uid:              `${fileId}_${i}`,
      fileId,
      proveedor:        provider,
      categoria:        category,
      productoOriginal: rawProd,
      productoNorm,
      groupKey:         makeGroupKey(productoNorm),
      atributo,
      precio,
    });
  }
  return rows;
};

// pendingFiles = { files: File[], version: number }
// Cada vez que version sube, PreciosTab procesa los nuevos archivos
const PreciosTab = ({ pendingFiles }) => {
  const [allRows,   setAllRows]   = useState([]);
  const [fileCards, setFileCards] = useState([]);
  const [loading,   setLoading]   = useState(false);
  const [search,    setSearch]    = useState("");
  const [catFilter, setCatFilter] = useState("Todos");
  const [dragging,  setDragging]  = useState(false);
  const uploadRef  = useRef();
  const priceSort  = useSort("precio", "asc");
  const lastVersion = useRef(-1);

  // Procesa nuevos archivos cuando llega una versión nueva desde App
  useEffect(() => {
    if (
      pendingFiles &&
      pendingFiles.version > lastVersion.current &&
      pendingFiles.files && pendingFiles.files.length > 0
    ) {
      lastVersion.current = pendingFiles.version;
      handlePriceFiles(pendingFiles.files);
    }
  }, [pendingFiles && pendingFiles.version]);  // eslint-disable-line

  const handlePriceFiles = useCallback(async (fileList) => {
    setLoading(true);
    const newRows  = [];
    const newCards = [];
    for (const file of Array.from(fileList)) {
      const ext    = file.name.split(".").pop().toLowerCase();
      const fileId = `${file.name}_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      try {
        if (ext === "csv") {
          const text  = await file.text();
          const lines = text.split(/\r?\n/).filter(Boolean);
          if (!lines.length) continue;
          const h1    = lines[0].replace(/^\uFEFF/, "");
          const delim = (h1.match(/;/g) || []).length >= (h1.match(/,/g) || []).length ? ";" : ",";
          const grid  = lines.map((l) =>
            l.replace(/^\uFEFF/, "").split(delim).map((c) => c.trim().replace(/^"|"$/g, ""))
          );
          const { provider, category } = detectProvCat(file.name);
          const rows = parseSheetGrid(grid, provider, category, fileId);
          newRows.push(...rows);
          newCards.push({ id: fileId, name: file.name, provider, category, count: rows.length });
        } else if (ext === "xlsx" || ext === "xls") {
          const buf = await file.arrayBuffer();
          const wb  = XLSX.read(buf, { type: "array" });
          for (const sheetName of wb.SheetNames) {
            const ws          = wb.Sheets[sheetName];
            const grid        = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
            const sheetFileId = `${fileId}_${sheetName}`;
            const { provider, category } = detectProvCat(file.name, sheetName);
            const rows = parseSheetGrid(grid, provider, category, sheetFileId);
            if (rows.length > 0) {
              newRows.push(...rows);
              newCards.push({ id: sheetFileId, name: `${file.name} [${sheetName}]`, provider, category, count: rows.length });
            }
          }
        }
      } catch (err) {
        console.error("Error al procesar", file.name, err);
      }
    }
    setAllRows((prev) => [...prev, ...newRows]);
    setFileCards((prev) => [...prev, ...newCards]);
    setLoading(false);
  }, []);

  const deleteFile = useCallback((fileId) => {
    setAllRows((prev) => prev.filter((r) => r.fileId !== fileId));
    setFileCards((prev) => prev.filter((f) => f.id !== fileId));
  }, []);

  const clearAll = () => { setAllRows([]); setFileCards([]); setSearch(""); setCatFilter("Todos"); };

  const categories = useMemo(() => {
    const cats = [...new Set(allRows.map((r) => r.categoria))].sort();
    return ["Todos", ...cats];
  }, [allRows]);

  const filtered = useMemo(() => {
    let rows = allRows;
    if (catFilter !== "Todos")
      rows = rows.filter((r) => r.categoria.toLowerCase() === catFilter.toLowerCase());
    if (search.trim()) {
      const q = normStr(search);
      rows = rows.filter((r) => r.productoNorm.includes(q) || r.groupKey.includes(q));
    }
    return rows;
  }, [allRows, catFilter, search]);

  const sortedRows = useMemo(() =>
    applySort(filtered, priceSort.key, priceSort.dir, (r, k) => {
      if (k === "proveedor") return r.proveedor.toLowerCase();
      if (k === "categoria") return r.categoria.toLowerCase();
      if (k === "producto")  return r.productoNorm;
      if (k === "atributo")  return r.atributo.toLowerCase();
      if (k === "precio")    return r.precio;
      return 0;
    }),
  [filtered, priceSort.key, priceSort.dir]);

  const bestByGroup = useMemo(() => {
    const map = {};
    filtered.forEach((r) => {
      if (!map[r.groupKey] || r.precio < map[r.groupKey]) map[r.groupKey] = r.precio;
    });
    return map;
  }, [filtered]);

  const { page, go, totalPages, slice, total } = usePag(sortedRows);
  const STH = (props) => <SortTh {...props} currentKey={priceSort.key} dir={priceSort.dir} onSort={priceSort.toggle} />;
  const proveedoresCount = new Set(filtered.map((r) => r.proveedor)).size;
  const gruposCount      = new Set(filtered.map((r) => r.groupKey)).size;

  return (
    <div className="space-y-5">

      {/* ── UPLOAD ZONE ─────────────────────────── */}
      <div
        onDrop={(e) => { e.preventDefault(); setDragging(false); handlePriceFiles(e.dataTransfer.files); }}
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onClick={() => uploadRef.current?.click()}
        className={`border-2 border-dashed rounded-xl p-4 cursor-pointer transition-all select-none ${
          dragging ? "border-blue-400 bg-blue-950/20" : "border-gray-700 hover:border-gray-600 bg-gray-900/30 hover:bg-gray-900"
        }`}
      >
        {loading
          ? <div className="flex items-center justify-center gap-2 text-blue-400">
              <Loader2 className="animate-spin" size={16} />
              <span className="text-sm">Procesando listas de precios…</span>
            </div>
          : <div className="flex flex-col sm:flex-row items-center justify-center gap-3 text-gray-400 text-sm">
              <div className="flex items-center gap-2"><Upload size={15} /><span>Agregar más listas de precios (.csv o .xlsx)</span></div>
              <span className="hidden sm:block text-gray-700">·</span>
              <span className="text-xs text-gray-600 font-mono bg-gray-800 px-2 py-0.5 rounded">
                Nombre: <span className="text-blue-400">Proveedor-Categoría.xlsx</span>
              </span>
            </div>}
        <input ref={uploadRef} type="file" multiple accept=".csv,.xlsx,.xls" className="hidden"
          onChange={(e) => handlePriceFiles(e.target.files)} />
      </div>

      {/* ── LISTA DE ARCHIVOS CON BOTÓN ELIMINAR ─── */}
      {fileCards.length > 0 && (
        <div className="bg-gray-900 border border-gray-700 rounded-xl overflow-hidden">
          <div className="flex items-center justify-between px-4 py-2.5 border-b border-gray-700">
            <span className="text-xs font-semibold text-gray-400 uppercase tracking-wide">
              Archivos cargados ({fileCards.length})
            </span>
            <button onClick={clearAll}
              className="flex items-center gap-1.5 px-2.5 py-1 bg-red-950/30 border border-red-800/40 text-red-400 hover:text-red-300 rounded-lg text-xs transition-colors">
              <Trash2 size={11} /> Limpiar todo
            </button>
          </div>
          <div className="divide-y divide-gray-800/60 max-h-52 overflow-y-auto">
            {fileCards.map((f) => (
              <div key={f.id} className="flex items-center justify-between px-4 py-2.5 hover:bg-gray-800/20 transition-colors">
                <div className="flex items-center gap-2.5 min-w-0">
                  <FileText size={13} className="text-gray-500 shrink-0" />
                  <div className="min-w-0">
                    <p className="text-sm text-gray-200 truncate">{f.name}</p>
                    <p className="text-xs text-gray-500 mt-0.5">
                      <span className="text-blue-400">{f.provider}</span>
                      <span className="mx-1.5 text-gray-700">·</span>
                      <span className="text-emerald-400">{f.category}</span>
                      <span className="mx-1.5 text-gray-700">·</span>
                      <span>{f.count} precios</span>
                    </p>
                  </div>
                </div>
                <button onClick={() => deleteFile(f.id)}
                  title="Eliminar este archivo"
                  className="shrink-0 ml-3 p-1.5 text-gray-600 hover:text-red-400 hover:bg-red-950/30 rounded-lg transition-all">
                  <X size={14} />
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── SEARCH + CATEGORY FILTER ──────────────── */}
      {allRows.length > 0 && (
        <div className="flex gap-3 flex-wrap items-center">
          <SearchBar
            value={search}
            onChange={(v) => { setSearch(v); go(0); }}
            placeholder="Buscar producto para comparar precios entre proveedores…"
          />
          <div className="flex gap-1 flex-wrap shrink-0">
            {categories.map((c) => (
              <button key={c} onClick={() => { setCatFilter(c); go(0); }}
                className={`px-3 py-2 rounded-lg text-xs font-medium transition-all ${
                  catFilter === c
                    ? "bg-emerald-700 text-white shadow-lg shadow-emerald-900/30"
                    : "bg-gray-800 text-gray-400 hover:text-white border border-gray-700"
                }`}>{c}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* ── STATS BAR ─────────────────────────────── */}
      {filtered.length > 0 && (
        <div className="flex items-center gap-6 text-xs text-gray-500 px-1 flex-wrap">
          <span><span className="text-white font-semibold">{total.toLocaleString("es-CL")}</span> precios</span>
          <span><span className="text-white font-semibold">{proveedoresCount}</span> proveedores</span>
          <span><span className="text-white font-semibold">{gruposCount}</span> grupos únicos</span>
          {search && (
            <span className="text-emerald-400">
              · {Object.keys(bestByGroup).length} grupos con mejor precio identificado
            </span>
          )}
        </div>
      )}

      {/* ── RESULTS TABLE ────────────────────────── */}
      {sortedRows.length > 0 && (
        <div className="bg-gray-900 border border-gray-700 rounded-xl overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full">
              <thead className="bg-gray-800/60">
                <tr>
                  <Th ch="Estado" />
                  <STH label="Categoría"            sk="categoria" />
                  <STH label="Proveedor"             sk="proveedor" />
                  <STH label="Producto Original"     sk="producto"  />
                  <STH label="Marca / Procedencia"   sk="atributo"  />
                  <STH label="Precio Unit."           sk="precio"   right />
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-800/60">
                {slice.map((r) => {
                  const isBest = bestByGroup[r.groupKey] === r.precio;
                  return (
                    <tr key={r.uid}
                      className={`transition-colors ${
                        isBest ? "bg-emerald-950/25 hover:bg-emerald-950/40" : "hover:bg-gray-800/30"
                      }`}>
                      <td className="px-3 py-2.5 text-center whitespace-nowrap">
                        {isBest
                          ? <span className="inline-flex items-center gap-1 px-2 py-0.5 bg-emerald-500/20 border border-emerald-500/40 text-emerald-300 text-xs rounded-full font-semibold">
                              <CheckCircle size={10} /> Mejor
                            </span>
                          : <span className="text-gray-700 text-xs">—</span>}
                      </td>
                      <td className="px-3 py-2 text-xs">
                        <span className="px-2 py-0.5 bg-gray-800 border border-gray-700 rounded text-gray-400">
                          {r.categoria}
                        </span>
                      </td>
                      <td className="px-3 py-2 text-sm font-medium text-white max-w-[140px]">
                        <span className="block truncate">{r.proveedor}</span>
                      </td>
                      <td className="px-3 py-2 text-sm text-gray-200 max-w-[220px]">
                        <span className="block truncate" title={r.productoOriginal}>{r.productoOriginal}</span>
                      </td>
                      <td className="px-3 py-2 text-xs text-gray-400 max-w-[160px]">
                        <span className="block truncate" title={r.atributo}>
                          {r.atributo || <span className="text-gray-700 italic">—</span>}
                        </span>
                      </td>
                      <td className={`px-3 py-2.5 text-sm text-right font-bold whitespace-nowrap ${
                        isBest ? "text-emerald-300" : "text-gray-200"
                      }`}>
                        ${fmtM(r.precio)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <Pager page={page} totalPages={totalPages} go={go} total={total} />
        </div>
      )}

      {/* ── EMPTY STATE ──────────────────────────── */}
      {allRows.length === 0 && !loading && (
        <div className="flex flex-col items-center justify-center py-20 gap-4 text-gray-600">
          <DollarSign size={48} className="opacity-15" />
          <div className="text-center">
            <p className="text-sm font-medium text-gray-500">Carga listas de precios para comenzar</p>
            <p className="text-xs mt-1 text-gray-600">Acepta .xlsx y .csv · Detecta Proveedor y Categoría automáticamente</p>
          </div>
          <div className="bg-gray-900 border border-gray-800 rounded-xl p-4 text-xs text-gray-500 space-y-1.5 max-w-sm">
            <p className="font-semibold text-gray-400 mb-2">Reglas de detección:</p>
            <p><span className="text-blue-400">Proveedor-Categoría.xlsx</span> → extrae ambos del nombre</p>
            <p><span className="text-blue-400">Proveedor.xlsx</span> + nombre de hoja → usa hoja como categoría</p>
            <p>Sin guión ni hoja → Categoría por defecto: <span className="text-emerald-400">Vacuno</span></p>
            <p>Columnas <span className="text-yellow-400">Marca / Procedencia / Origen / Planta</span> → atributo</p>
            <p className="mt-2 pt-2 border-t border-gray-800 text-gray-600">
              Agrupación inteligente: «medallón», «entero» y «porcionado» se ignoran al comparar variantes del mismo corte
            </p>
          </div>
        </div>
      )}

      {allRows.length > 0 && filtered.length === 0 && (
        <div className="flex flex-col items-center justify-center py-16 text-gray-600 gap-3">
          <Search size={36} className="opacity-20" />
          <p className="text-sm">
            Sin resultados para <span className="text-gray-400">"{search}"</span>
            {catFilter !== "Todos" && <> en categoría <span className="text-gray-400">{catFilter}</span></>}
          </p>
        </div>
      )}
    </div>
  );
};



// ═══════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════

const EmptyState = ({ msg, icon }) => (
  <div className="flex flex-col items-center justify-center py-20 gap-3"
    style={{ color: "#444" }}>
    <div style={{ opacity: 0.12 }}>{icon}</div>
    <p className="text-sm">{msg}</p>
  </div>
);

function App() {
  const [rawData,    setRawData]    = useState({ ventas: [], guias: [], compras: [] });
  const [detected,   setDetected]   = useState({ ventas: null, guias: null, compras: null, preciosCount: 0 });
  const [loading,    setLoading]    = useState(false);
  const [loaded,     setLoaded]     = useState(false);
  const [activeTab,  setActiveTab]  = useState(0);
  const [priceQueue, setPriceQueue] = useState({ files: [], version: 0 });

  const handleFiles = useCallback(async (fileList) => {
    setLoading(true);
    const dataUpdates = {};
    const nameUpdates = {};
    const priceFiles  = [];

    for (const file of Array.from(fileList)) {
      const n = file.name.toLowerCase();
      let key = null;
      if      (n.includes("venta"))                          key = "ventas";
      else if (n.includes("guia") || n.includes("despacho")) key = "guias";
      else if (n.includes("compra"))                         key = "compras";

      if (key) {
        nameUpdates[key] = file.name;
        dataUpdates[key] = parseCSVText(await file.text());
      } else {
        priceFiles.push(file);
      }
    }

    if (Object.keys(dataUpdates).length > 0) {
      setRawData((prev)  => ({ ...prev, ...dataUpdates  }));
      setDetected((prev) => ({ ...prev, ...nameUpdates  }));
    }
    if (priceFiles.length > 0) {
      setDetected((prev) => ({ ...prev, preciosCount: (prev.preciosCount || 0) + priceFiles.length }));
      setPriceQueue((prev) => ({ files: priceFiles, version: prev.version + 1 }));
    }

    setLoading(false);
    setLoaded(true);
  }, []);

  const hasData = Object.values(rawData).some((d) => d.length > 0) || priceQueue.version > 0;

  const TABS = [
    { label: "Reporte Ventas",        icon: <TrendingUp   size={15} />, count: rawData.ventas.length  },
    { label: "Compras Clientes",       icon: <ShoppingCart size={15} />, count: rawData.guias.length   },
    { label: "Proveedores",            icon: <Package      size={15} />, count: rawData.compras.length },
    { label: "Optimizador de Precios", icon: <DollarSign   size={15} />, count: null                   },
  ];

  if (!loaded) return (
    <UploadScreen
      onFiles={handleFiles}
      loading={loading}
      detected={detected}
      hasData={hasData}
      onBack={() => setLoaded(true)}
    />
  );

  return (
    <div className="min-h-screen text-gray-100" style={{ background: "#000", position: "relative" }}>
      <LogoBg />

      {/* ── Sticky nav ──────────────────────────────── */}
      <div className="sticky top-0 z-10 border-b px-5 py-3"
        style={{
          background:   "rgba(0,0,0,0.96)",
          backdropFilter: "blur(12px)",
          borderColor:  "#1a1a1a",
        }}>
        <div className="flex items-center justify-between mb-3">
          <span className="text-sm font-semibold tracking-widest uppercase" style={{ color: "#c88d31", letterSpacing: "0.15em" }}>Dashboard Comercial</span>

          <button
            onClick={() => setLoaded(false)}
            className="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg transition-all"
            style={{
              color:   "#c88d31",
              border:  "1px solid rgba(200,141,49,0.3)",
              background: "transparent",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = "rgba(200,141,49,0.1)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = "transparent"; }}
          >
            <Upload size={12} /> Agregar archivos
          </button>
        </div>

        {/* Tabs */}
        <div className="flex gap-1 flex-wrap">
          {TABS.map((t, i) => {
            const isActive = activeTab === i;
            return (
              <button key={i} onClick={() => setActiveTab(i)}
                className="flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-xs font-semibold transition-all"
                style={isActive ? {
                  background: "rgba(200,141,49,0.18)",
                  border:     "1px solid rgba(200,141,49,0.5)",
                  color:      "#c88d31",
                } : {
                  background: "transparent",
                  border:     "1px solid transparent",
                  color:      "#555",
                }}
                onMouseEnter={(e) => {
                  if (!isActive) e.currentTarget.style.color = "#c88d31";
                }}
                onMouseLeave={(e) => {
                  if (!isActive) e.currentTarget.style.color = "#555";
                }}
              >
                {t.icon} {t.label}
                {t.count != null && t.count > 0 && (
                  <span className="px-1.5 py-0.5 rounded-full text-xs"
                    style={{
                      background: isActive ? "rgba(200,141,49,0.25)" : "#1a1a1a",
                      color:      isActive ? "#c88d31" : "#555",
                    }}>
                    {t.count.toLocaleString("es-CL")}
                  </span>
                )}
                {i === 3 && !isActive && (
                  <span className="px-1.5 py-0.5 rounded-full text-xs"
                    style={{ background: "rgba(200,141,49,0.15)", color: "#c88d31", border: "1px solid rgba(200,141,49,0.3)" }}>
                    NUEVO
                  </span>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* Tab content */}
      <div className="p-5 max-w-screen-2xl mx-auto">
        {activeTab === 0 && (rawData.ventas.length > 0
          ? <VentasTab  data={rawData.ventas}  />
          : <EmptyState msg="No se detectó archivo de ventas"            icon={<TrendingUp   size={48} />} />)}
        {activeTab === 1 && (rawData.guias.length > 0
          ? <GuiasTab   data={rawData.guias}   />
          : <EmptyState msg="No se detectó archivo de guías de despacho" icon={<ShoppingCart size={48} />} />)}
        {activeTab === 2 && (rawData.compras.length > 0
          ? <ComprasTab data={rawData.compras} />
          : <EmptyState msg="No se detectó archivo de compras"           icon={<Package      size={48} />} />)}
        {activeTab === 3 && <PreciosTab pendingFiles={priceQueue} />}
      </div>
    </div>
  );
}

import { createRoot } from "react-dom/client";
createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
